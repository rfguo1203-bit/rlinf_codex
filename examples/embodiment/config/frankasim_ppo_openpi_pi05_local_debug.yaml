defaults:
  - env/frankasim_pickcube_vision@env.train
  - env/frankasim_pickcube_vision@env.eval
  - model/pi0_5@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - override hydra/job_logging: stdout
  - _self_

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 1
  component_placement:
    env: 0
    rollout: 0
    actor: 1-3

runner:
  task_type: embodied
  logger:
    log_path: "../results"
    project_name: rlinf
    experiment_name: "franka_sim_ppo_openpi_pi05_local_debug"
    logger_backends: ["tensorboard"]

  max_epochs: 400
  max_steps: -1

  only_eval: false
  val_check_interval: 50
  save_interval: -1

  seq_length: 1
  max_prompt_length: 1

  resume_dir: null
  ckpt_path: null

algorithm:
  update_epoch: 8
  normalize_advantages: true
  kl_penalty: kl
  group_size: 1

  rollout_epoch: 1
  eval_rollout_epoch: 1

  reward_type: chunk_level
  logprob_type: chunk_level
  entropy_type: token_level

  adv_type: gae
  loss_type: actor_critic
  loss_agg_func: token-mean
  kl_beta: 0.0
  entropy_bonus: 0.0

  clip_ratio_high: 0.2
  clip_ratio_low: 0.2
  clip_ratio_c: 3.0
  value_clip: 1.0
  huber_delta: 10.0

  gamma: 0.99
  gae_lambda: 0.95

  reward_coef: 1.0

  sampling_params:
    do_sample: true
    temperature_train: 1.0
    temperature_eval: 0.6
    top_k: 0
    top_p: 1.0
    repetition_penalty: 1.0

  length_params:
    max_new_token: 1
    max_length: 1
    min_length: 1

env:
  group_name: EnvGroup

  train:
    obs_format: tensor
    wrap_obs_mode: openpi
    total_num_envs: 16
    group_size: ${algorithm.group_size}
    max_steps_per_rollout_epoch: 256
    max_episode_steps: 100

    use_rel_reward: true
    reward_coef: ${algorithm.reward_coef}
    is_eval: false
    video_cfg:
      save_video: false
      info_on_video: true
      video_base_dir: ${runner.logger.log_path}/video/train

  eval:
    obs_format: tensor
    wrap_obs_mode: openpi
    total_num_envs: 16
    group_size: ${algorithm.group_size}
    max_steps_per_rollout_epoch: 256
    max_episode_steps: 100

    use_rel_reward: true
    reward_coef: ${algorithm.reward_coef}
    is_eval: true
    video_cfg:
      save_video: true
      video_base_dir: ${runner.logger.log_path}/video/eval

rollout:
  group_name: RolloutGroup
  backend: huggingface
  enable_offload: false
  pipeline_stage_num: 2
  collect_prev_infos: true

  model:
    model_path: "/path/to/model/RLinf-Pi05-SFT"
    precision: ${actor.model.precision}

  enable_torch_compile: false
  enable_cuda_graph: false

actor:
  group_name: ActorGroup
  training_backend: fsdp
  micro_batch_size: 384
  global_batch_size: 1152
  seed: 1234
  enable_offload: false

  model:
    model_type: "openpi"
    model_path: "/path/to/model/RLinf-Pi05-SFT"
    precision: null
    action_dim: 4
    num_action_chunks: 1
    num_steps: 3
    add_value_head: true
    openpi:
      config_name: "pi0_custom"
      pi05: true
      num_images_in_input: 2
      noise_method: "flow_sde"
      noise_level: 0.5
      action_chunk: ${actor.model.num_action_chunks}
      num_steps: ${actor.model.num_steps}
      train_expert_only: true
      action_env_dim: ${actor.model.action_dim}
      add_value_head: ${actor.model.add_value_head}
      value_after_vlm: true

  optim:
    lr: 3.0e-4
    value_lr: 3.0e-4
    adam_beta1: 0.9
    adam_beta2: 0.999
    adam_eps: 1.0e-08
    weight_decay: 0.01
    clip_grad: 0.5

  fsdp_config:
    sharding_strategy: no_shard
    amp:
      enabled: true
      precision: bf16
    gradient_checkpointing: false

reward:
  use_reward_model: false

critic:
  use_critic_model: false
